services:
  - type: web
    name: pharm-app-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate:deploy
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharm-app-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://muhamed2407.github.io
      - key: PORT
        value: 10000

databases:
  - name: pharm-app-db
    plan: free
